# HYPRLOCK CONFIGURATION                                 #
# Hyprland's GPU-accelerated screen lock
# Modern, customizable lock screen with multiple input fields and backgrounds

# General settings
general {
# Disable loading of the Hyprland config while locked
    disable_loading_bar = false

# Show FPS counter (for debugging)
    hide_cursor = true

# Grace period before lock becomes active (seconds)
    grace = 0

# Don't fail if password is empty
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = screenshot  # Use 'screenshot' for blurred current screen, or path to image

# Blur settings for screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# INPUT FIELD (Password box)

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2

    dots_size = 0.25  # Size of dots (0.2 - 0.8)
    dots_spacing = 0.2  # Spacing between dots
    dots_center = true
    dots_rounding = -1  # -1 = circle

    outer_color = rgba(200, 200, 200, 0.3)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)

    fade_on_empty = false
    fade_timeout = 1000  # Milliseconds before fade

    placeholder_text = <i>Enter Password...</i>
    hide_input = false

    rounding = 10

    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout = 2000  # Milliseconds before clearing fail text
    fail_transition = 300  # Milliseconds for fail animation

    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1

    position = 0, -20
    halign = center
    valign = center
}

# LABELS

# Time label
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 90
    font_family = JetBrains Mono

    position = 0, 200
    halign = center
    valign = center
}

# Date label
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 25
    font_family = JetBrains Mono

    position = 0, 100
    halign = center
    valign = center
}

# User label
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.8)
    font_size = 20
    font_family = JetBrains Mono

    position = 0, -100
    halign = center
    valign = center
}

# Keyboard layout indicator
label {
    monitor =
    text = cmd[update:1000] echo "$(hyprctl devices -j | jq -r '.keyboards[] | select(.main) | .active_keymap')"
    color = rgba(255, 255, 255, 0.6)
    font_size = 16
    font_family = JetBrains Mono

    position = 0, -150
    halign = center
    valign = center
}

# Battery status (for laptops)
label {
    monitor =
    text = cmd[update:5000] echo "🔋 $(cat /sys/class/power_supply/BAT0/capacity)%"
    color = rgba(255, 255, 255, 0.6)
    font_size = 18
    font_family = JetBrains Mono

    position = -30, -30
    halign = right
    valign = top
}
