# This is the main entry point for Hyprland configuration.
# All specific configurations are sourced from the conf/ directory.
# Edit individual config files in ~/.config/hypr/conf/ for better organization.

$conf = $HOME/.config/hypr/conf                            # Config directory

# Colors must be loaded first
source = $conf/colors.conf

# Core settings
source = $conf/variables.conf                              # Custom variables
source = $conf/env.conf                                    # Environment variables
source = $conf/display.conf                                # Monitor configuration

# Layout & behavior
source = $conf/layout.conf                                 # Window layout settings
source = $conf/ui.conf                                     # Visual configuration
source = $conf/gestures.conf                               # Input & gesture configuration

# User actions
source = $conf/binds.conf                                  # Keybindings
source = $conf/rules.conf                                  # Workspace & layer rules
source = $conf/window-rules.conf                           # Per-app window rules
source = $conf/permissions.conf                            # Permission settings

# Startup
source = $conf/autostart.conf                              # Autostart applications
