# HYPRIDLE CONFIGURATION                                 #
# Hyprland's idle management daemon
# Handles screen locking, display power management, and sleep

# General settings
general {
# Lock the screen before suspending (recommended for security)
    lock_cmd = pidof hyprlock || hyprlock

    before_sleep_cmd = loginctl lock-session

    after_sleep_cmd = hyprctl dispatch dpms on

# Ignore dbus-sent idle-inhibit requests (e.g., from browsers)
# Set to false if you want apps to prevent auto-lock (watching videos, etc.)
    ignore_dbus_inhibit = false
}

# Rule 1: Dim screen after 2 minutes of inactivity
listener {
    timeout = 120

    on-timeout = brightnessctl -s set 10%

    on-resume = brightnessctl -r
}

# Rule 2: Lock screen after 5 minutes of inactivity
listener {
    timeout = 300

    on-timeout = loginctl lock-session
}

# Rule 3: Turn off displays after 6 minutes of inactivity
listener {
    timeout = 360

    on-timeout = hyprctl dispatch dpms off

    on-resume = hyprctl dispatch dpms on
}

