# Author: Nuncvc1v0

# Color scheme: Tokyo Night

# Background shades (darkest → lightest)
$bg_darker   = rgb(0c0e14)                                  # Deepest background
$bg_dark     = rgb(16161e)                                  # Dark background
$bg          = rgb(1a1b26)                                  # Main background
$bg_light    = rgb(292e42)                                  # Highlighted background
$bg_visual   = rgb(33467c)                                  # Visual selection

# Foreground shades (darker → lighter)
$fg_gutter   = rgb(3b4261)                                  # Line numbers, gutters
$fg_comment  = rgb(565f89)                                  # Comments, secondary text
$fg_dark     = rgb(a9b1d6)                                  # Dimmed text
$fg          = rgb(c0caf5)                                  # Main text

# Borders & UI elements
$border_inactive = $bg_light
$border_active   = $blue

# Primary colors
$red         = rgb(f7768e)                                  # Errors, important
$red_dark    = rgb(db4b4b)                                  # Darker red variant

$orange      = rgb(ff9e64)                                  # Warnings
$yellow      = rgb(e0af68)                                  # Attention

$green       = rgb(9ece6a)                                  # Success, strings
$green_cyan  = rgb(73daca)                                  # Cyan-green variant
$green_dark  = rgb(41a6b5)                                  # Dark cyan-green

$cyan        = rgb(7dcfff)                                  # Info, constants
$teal        = rgb(1abc9c)                                  # Decorative

$blue        = rgb(7aa2f7)                                  # Links, functions
$blue_dark   = rgb(3d59a1)                                  # Dark blue
$blue_cyan   = rgb(2ac3de)                                  # Cyan-blue
$blue_cyan2  = rgb(0db9d7)                                  # Darker cyan-blue
$blue_light  = rgb(89ddff)                                  # Light blue
$blue_pale   = rgb(b4f9f8)                                  # Pale blue
$blue_subtle = rgb(394b70)                                  # Subtle blue

$magenta     = rgb(bb9af7)                                  # Keywords, tags
$magenta_alt = rgb(ff007c)                                  # Alternative magenta
$purple      = rgb(9d7cd8)                                  # Variables

# SEMANTIC COLORS (Git, diagnostics)

$git_add     = rgb(449dab)                                  # Added lines
$git_change  = rgb(6183bb)                                  # Modified lines
$git_delete  = rgb(914c54)                                  # Deleted lines

$diagnostic_error   = $red                                  # Error diagnostics
$diagnostic_warn    = $orange                               # Warning diagnostics
$diagnostic_info    = $cyan                                 # Info diagnostics
$diagnostic_hint    = $teal                                 # Hint diagnostics
