# - Per-application window behavior
# - Floating, tiling, workspace assignments
# - Opacity, position, size rules
# - XWayland specific settings

# Suppress maximize events from all applications
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize                             # Ignore app maximize requests (recommended)
}

# Fix for XWayland drag-and-drop windows
windowrule {
    name = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false

    no_focus = true                                       # Don't focus empty XWayland windows
}

# Hyprland run dialog
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    float = yes
    move  = 20 monitor_h-120                              # Position near bottom-left
}

# File chooser dialogs
windowrule {
    name = float-file-dialogs
    match:title = (Open File|Save File|Select Folder)

    float = yes
    size  = 900 600
    center = yes
}

# Picture-in-picture
windowrule {
    name = pip-windows
    match:title = (Picture-in-Picture|PiP)

    float = yes
    pin   = yes
    size  = 640 360
    move  = 100%-w-20 100%-h-70
}

# Firefox
windowrule {
    name = firefox-pip
    match:class = firefox
    match:title = (Picture-in-Picture)

    float = yes
    pin   = yes
    size  = 640 360
}

xwayland {
    force_zero_scaling = true                             # Scale XWayland apps at compositor level
}

# float          - Make window floating
# tile           - Force window to tile
# fullscreen     - Start in fullscreen
# maximize       - Maximize window
# pin            - Pin window (visible on all workspaces)
# workspace      - Assign to workspace (number or name)
# center         - Center window on screen
# move           - Position (x y or expressions)
# size           - Set size (width height)
# opacity        - Set opacity (active [inactive])
# no_animate     - Disable animations
# no_blur        - Disable blur
# no_focus       - Don't focus window
# no_shadow      - Disable shadow
# suppress_event - Ignore events (maximize, fullscreen, etc.)
