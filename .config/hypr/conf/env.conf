# Sets environment variables for:
# - Wayland/X11 backend preferences
# - Application scaling and theming
# - Hardware acceleration
# - Cursor themes and sizes

env = GDK_BACKEND,wayland,x11,*                           # Prefer Wayland, fallback to X11
env = QT_QPA_PLATFORM,wayland;xcb                         # Qt Wayland with XCB fallback
env = CLUTTER_BACKEND,wayland                             # Clutter toolkit
env = XDG_CURRENT_DESKTOP,Hyprland                        # Desktop environment ID
env = XDG_SESSION_DESKTOP,Hyprland                        # Session desktop ID
env = XDG_SESSION_TYPE,wayland                            # Session type
env = QT_STYLE_OVERRIDE,kvantum                           # Qt theming (requires kvantum)
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1               # Disables built-in Qt window decorations

env = GDK_SCALE,1                                         # GTK scale (1.5 or 2 for HiDPI)
env = GDK_DPI_SCALE,1                                     # GTK DPI scale
env = QT_AUTO_SCREEN_SCALE_FACTOR,1                       # Qt auto scaling
env = QT_SCALE_FACTOR,1                                   # Qt manual scale (1.5/2 for HiDPI)

env = SDL_VIDEODRIVER,wayland                             # SDL for games/media
env = MOZ_ENABLE_WAYLAND,1                                # Firefox Wayland support
env = ELECTRON_OZONE_PLATFORM_HINT,auto                   # Electron apps (VSCode, Discord)
env = ELECTRON_ENABLE_WAYLAND,1                           # Force Electron Wayland
env = _JAVA_AWT_TOOLKIT,WLToolkit                         # Java Wayland support

env = LIBVA_DRIVER_NAME,iHD                               # VA-API: iHD (modern), i965 (legacy), radeonsi (AMD)

env = TERMINAL,alacritty                                  # Terminal emulator
env = EDITOR,subl                                         # Text editor (alt: helix, zed)
env = VISUAL,subl                                         # Visual editor
env = BROWSER,firefox                                     # Web browser (alt: thorium-browser)

env = XCURSOR_SIZE,24                                     # X11 cursor size (32/48 for HiDPI)
env = HYPRCURSOR_SIZE,24                                  # Hyprland cursor size
env = HYPRCURSOR_FORCE_SCALE,1                            # Force cursor scaling

env = UV_PYTHON,python3.13                                # UV default Python version
env = UV_CACHE_DIR,/data/system/caches/uv                 # UV cache location

env = SAL_USE_VCLPLUGIN,gtk3
env = GTK_THEME,Tokyonight-Dark
