# - Window decorations (rounding, shadows, blur)
# - Border colors and styles
# - Opacity settings
# - Animation curves and timings
# - Group window appearance

general {
    border_size = 1                                       # Border width (px)

    col.active_border   = $blue $magenta 45deg            # Active window border (supports gradients)
    col.inactive_border = $bg_light                       # Inactive window border

}

decoration {
# Rounding
    rounding = 0                                          # Corner radius (px)

# Opacity
    active_opacity     = 1.0                              # Active window opacity (0.0 - 1.0)
    inactive_opacity   = 0.8                              # Inactive window opacity (0.0 - 1.0)
    fullscreen_opacity = 1.0                              # Fullscreen window opacity (0.0 - 1.0)

# Dimming
    dim_inactive = true                                   # Dim inactive windows
    dim_strength = 0.1                                    # Dim strength (0.0 - 1.0)

# Shadows
    shadow {
        enabled      = true                               # Enable drop shadows
        range        = 12                                 # Shadow radius (px)
        render_power = 3                                  # Shadow falloff (1 - 4)
        color        = rgba(16161eee)                     # Shadow color (RGBA)
    }

# Blur
    blur {
        enabled          = true                           # Enable blur behind transparent windows
        size             = 6                              # Blur radius
        passes           = 3                              # Blur passes (more = stronger)
        new_optimizations = true                          # Enable performance optimizations
        xray             = true                           # Make borders/decorations opaque
        ignore_opacity   = true                           # Ignore window opacity for blur
    }
}

group {
    col.border_active   = $blue                           # Active group border color
    col.border_inactive = $bg_light                       # Inactive group border color

    groupbar {
        enabled         = true                            # Enable group title bar
        font_size       = 10                              # Group bar font size

        col.active      = $blue                           # Active group bar background
        col.inactive    = $bg_dark                        # Inactive group bar background
        text_color      = $fg                             # Group bar text color

    }
}

animations {
    enabled = true                                        # Master switch for animations

# Bezier curves (custom easing functions)
    bezier = wind,      0.05, 0.9, 0.1, 1.05              # Smooth with slight overshoot
    bezier = winIn,     0.1, 1.1, 0.1, 1.1                # Bounce in
    bezier = winOut,    0.3, -0.3, 0, 1                   # Snap out
    bezier = liner,     1, 1, 1, 1                        # Linear (no easing)
    bezier = overshot,  0.05, 0.9, 0.1, 1.05              # Overshoot effect
    bezier = smoothOut, 0.5, 0, 0.99, 0.99                # Smooth fade out
    bezier = smoothIn,  0.5, -0.5, 0.68, 1.5              # Smooth fade in

# Window animations
    animation = windows,     1, 6, wind, slide            # Window open/close
    animation = windowsIn,   1, 5, winIn, slide           # Window appearing
    animation = windowsOut,  1, 3, smoothOut, slide       # Window disappearing
    animation = windowsMove, 1, 5, wind, slide            # Window movement

# UI element animations
    animation = border,      1, 1, liner                  # Border color changes
    animation = fade,        1, 3, smoothOut              # Fade in/out

# Workspace animations
    animation = workspaces,    1, 5, overshot             # Workspace switching (default)
    animation = workspacesIn,  1, 5, winIn, slide         # Workspace appearing
    animation = workspacesOut, 1, 5, winOut, slide        # Workspace disappearing
}
