# - Window gaps and layout behavior
# - Layout algorithm (dwindle/master)
# - Tiling behavior
# - Wallpaper and branding settings

general {
# Gaps
    gaps_in  = 4                                          # Inner gaps between windows (px)
    gaps_out = 4                                          # Outer gaps to screen edges (px)

# Window behavior
    resize_on_border = true                               # Click and drag borders to resize

# Layout
    layout = dwindle                                      # Layout algorithm: dwindle or master

# Advanced
    allow_tearing = false                                 # Enable for low-latency gaming (see docs)
}

dwindle {
# Basic behavior
    pseudotile     = true                                 # Pseudo-tiling mode
    preserve_split = true                                 # Keep manual split direction

# Split behavior

# Special behaviors

# Smart features
}

master {
# Basic behavior

# Master area

# Special behaviors

# Smart features
}

misc {
# Branding
    force_default_wallpaper = 0                           # 0 = disable anime wallpapers, -1 = random, 0-2 = specific
    disable_hyprland_logo   = true                        # Hide Hyprland logo on empty workspace
    disable_splash_rendering = true                       # Disable splash screen on startup

# Performance
    vfr = true                                            # Variable frame rate (reduce CPU usage when idle)
    vrr = 2                                               # Variable refresh rate: 0 = off, 1 = on, 2 = fullscreen only

# Display power management
    mouse_move_enables_dpms = true                        # Wake displays on mouse movement
    key_press_enables_dpms = true                         # Wake displays on key press

# Focus behavior

# Rendering

