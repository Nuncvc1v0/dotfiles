# monitor           - Bind workspace to monitor
# gapsout           - Override outer gaps for workspace
# gapsin            - Override inner gaps for workspace
# on-created-empty  - Execute command when workspace created empty
# blur              - Enable blur behind layer
# ignorealpha       - Ignore pixels with alpha below threshold
# ignorezero        - Ignore fully transparent pixels (better blur)
# noanim            - Disable animations for layer
# dimaround         - Dim background when layer is visible
