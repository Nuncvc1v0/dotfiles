# Author: Nuncvc1v0

# Bind types:

# Variables defined in variables.conf

bindd = $mainMod,       Return, Launch terminal,        exec, $terminal
bindd = $mainMod,       E,      File manager,           exec, $fileManager
bindd = $mainMod,       R,      App launcher,           exec, $menu
bindd = $mainMod,       B,      Browser,                exec, $browser
bindd = $mainMod SHIFT, Return, Floating terminal,      exec, [float; size 50% 50%; center] $terminal
bindd = $mainMod,       V,      Clipboard manager,      exec, cliphist list | anyrun --plugins libstdin.so | cliphist decode | wl-copy

bindd = $mainMod,       Q,      Close window,           killactive,
bindd = $mainMod SHIFT, Q,      Kill process,           exec, kill -9 $(hyprctl activewindow -j | jq -r '.pid')
bindd = $mainMod,       F,      Fullscreen,             fullscreen, 0
bindd = $mainMod SHIFT, F,      Maximize (keep bar),    fullscreen, 1
bindd = $mainMod,       Space,  Toggle floating,        togglefloating,
bindd = $mainMod,       P,      Pin window,             pin,
bindd = $mainMod,       J,      Toggle split,           layoutmsg, togglesplit
bindd = $mainMod,       C,      Center window,          centerwindow,

# Window grouping (tabs)
bindd = $mainMod,       T,      Toggle group,           togglegroup,
bindd = $mainMod,       Tab,    Next in group,          changegroupactive, f
bindd = $mainMod SHIFT, Tab,    Previous in group,      changegroupactive, b

# Arrow keys
bindd = $mainMod, left,  Focus left,  movefocus, l
bindd = $mainMod, right, Focus right, movefocus, r
bindd = $mainMod, up,    Focus up,    movefocus, u
bindd = $mainMod, down,  Focus down,  movefocus, d

bindd = $mainMod CTRL, left,  Move window left,  movewindow, l
bindd = $mainMod CTRL, right, Move window right, movewindow, r
bindd = $mainMod CTRL, up,    Move window up,    movewindow, u
bindd = $mainMod CTRL, down,  Move window down,  movewindow, d

binded = $mainMod SHIFT, left,  Shrink width,  resizeactive, -50 0
binded = $mainMod SHIFT, right, Grow width,    resizeactive, 50 0
binded = $mainMod SHIFT, up,    Shrink height, resizeactive, 0 -50
binded = $mainMod SHIFT, down,  Grow height,   resizeactive, 0 50

bindd = $mainMod, code:10, Workspace 1,  workspace, 1
bindd = $mainMod, code:11, Workspace 2,  workspace, 2
bindd = $mainMod, code:12, Workspace 3,  workspace, 3
bindd = $mainMod, code:13, Workspace 4,  workspace, 4
bindd = $mainMod, code:14, Workspace 5,  workspace, 5
bindd = $mainMod, code:15, Workspace 6,  workspace, 6
bindd = $mainMod, code:16, Workspace 7,  workspace, 7
bindd = $mainMod, code:17, Workspace 8,  workspace, 8
bindd = $mainMod, code:18, Workspace 9,  workspace, 9
bindd = $mainMod, code:19, Workspace 10, workspace, 10

bindd = $mainMod SHIFT, code:10, Move to WS 1,  movetoworkspace, 1
bindd = $mainMod SHIFT, code:11, Move to WS 2,  movetoworkspace, 2
bindd = $mainMod SHIFT, code:12, Move to WS 3,  movetoworkspace, 3
bindd = $mainMod SHIFT, code:13, Move to WS 4,  movetoworkspace, 4
bindd = $mainMod SHIFT, code:14, Move to WS 5,  movetoworkspace, 5
bindd = $mainMod SHIFT, code:15, Move to WS 6,  movetoworkspace, 6
bindd = $mainMod SHIFT, code:16, Move to WS 7,  movetoworkspace, 7
bindd = $mainMod SHIFT, code:17, Move to WS 8,  movetoworkspace, 8
bindd = $mainMod SHIFT, code:18, Move to WS 9,  movetoworkspace, 9
bindd = $mainMod SHIFT, code:19, Move to WS 10, movetoworkspace, 10

# Move without focus change
bindd = $mainMod CTRL SHIFT, code:10, Move silent to 1,  movetoworkspacesilent, 1
bindd = $mainMod CTRL SHIFT, code:11, Move silent to 2,  movetoworkspacesilent, 2
bindd = $mainMod CTRL SHIFT, code:12, Move silent to 3,  movetoworkspacesilent, 3
bindd = $mainMod CTRL SHIFT, code:13, Move silent to 4,  movetoworkspacesilent, 4
bindd = $mainMod CTRL SHIFT, code:14, Move silent to 5,  movetoworkspacesilent, 5
bindd = $mainMod CTRL SHIFT, code:15, Move silent to 6,  movetoworkspacesilent, 6
bindd = $mainMod CTRL SHIFT, code:16, Move silent to 7,  movetoworkspacesilent, 7
bindd = $mainMod CTRL SHIFT, code:17, Move silent to 8,  movetoworkspacesilent, 8
bindd = $mainMod CTRL SHIFT, code:18, Move silent to 9,  movetoworkspacesilent, 9
bindd = $mainMod CTRL SHIFT, code:19, Move silent to 10, movetoworkspacesilent, 10

# Navigate adjacent workspaces
bindd = $mainMod, bracketleft,  Previous workspace, workspace, e-1
bindd = $mainMod, bracketright, Next workspace,     workspace, e+1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

bindd = $mainMod SHIFT, S, Screenshot region,      exec, hyprshot -m region --current-monitor
bindd = ,Print,            Screenshot screen,      exec, hyprshot -m output --current-monitor
bindd = $mainMod, Print,   Screenshot window,      exec, hyprshot -m window --current-monitor
bindd = CTRL SHIFT, Print, Screenshot + editor,    exec, hyprshot -m region --clipboard-only | swappy -f -

# MULTIMEDIA KEYS (Fn keys)

# Brightness
bindd = , XF86MonBrightnessUp,   Brightness up,   exec, swayosd-client --brightness +5
bindd = , XF86MonBrightnessDown, Brightness down, exec, swayosd-client --brightness -5

# Volume (repeatable)
bindd = , XF86AudioMute,        Mute toggle,     exec, swayosd-client --output-volume mute-toggle
bindd = , XF86AudioRaiseVolume, Volume up,       exec, swayosd-client --output-volume +5 --max-volume 100
bindd = , XF86AudioLowerVolume, Volume down,     exec, swayosd-client --output-volume -5 --max-volume 100
bind  = , XF86AudioMicMute,     exec, swayosd-client --input-volume mute-toggle

# Media controls
bindd = , XF86AudioPlay,  Play/Pause,     exec, playerctl play-pause
bindd = , XF86AudioPause, Pause,          exec, playerctl pause
bindd = , XF86AudioNext,  Next track,     exec, playerctl next
bindd = , XF86AudioPrev,  Previous track, exec, playerctl previous
bindd = , XF86AudioStop,  Stop playback,  exec, playerctl stop

# SYSTEM

bindd = $mainMod,       L,      Lock screen,           exec, loginctl lock-session
bindd = $mainMod,       Escape, Notification center,   exec, swaync-client -t -sw
bindd = $mainMod SHIFT, Escape, Close notifications,   exec, swaync-client -C
bindd = $mainMod,       W,      Random wallpaper,      exec, waypaper --random
bindd = $mainMod,       G,      Toggle gamemode,       exec, ~/.config/hypr/scripts/gamemode.sh

# Hyprland control
bindd = $mainMod SHIFT, R, Reload config,   exec, hyprctl reload
bindd = $mainMod SHIFT, M, Exit Hyprland,   exit,
