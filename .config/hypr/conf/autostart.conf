# Author: Nuncvc1v0

exec-once = uwsm app -- hyprsunset --temperature 2700

exec-once = uwsm app -- swww-daemon
exec-once = sleep 1 && uwsm app -- waypaper --random

exec-once = uwsm app -- swaync

exec-once = uwsm app -- swayosd-server

exec-once = uwsm app -- wl-paste --type text --watch cliphist store
exec-once = uwsm app -- wl-paste --type image --watch cliphist store

exec-once = uwsm app -- ashell

exec-once = /usr/lib/hyprpolkitagent

exec-once = uwsm app -- gnome-keyring

# Idle & lock - Configs: ~/.config/hypr/hypridle.conf & hyprlock.conf
exec-once = uwsm app -- hypridle

exec-once = uwsm app -- udiskie &

# Auto-start apps in workspaces
exec-once = [workspace 2 silent] firefox
