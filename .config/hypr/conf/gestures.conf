# Author: Nuncvc1v0

# - Keyboard layouts and switching
# - Mouse and touchpad behavior
# - Touchpad gestures (swipe, pinch)
# - Per-device input settings

input {
# Keyboard layout and switching
    kb_layout  = us,ru                                    # US and Russian layouts
    kb_options = grp:alt_shift_toggle                     # Alt+Shift to switch layouts
    kb_variant =                                          # Layout variants (empty = default)
    kb_model   =                                          # Keyboard model (empty = auto)
    kb_rules   =                                          # XKB rules (empty = default)

# Mouse behavior
    follow_mouse = 1                                      # Focus follows mouse (0 = disabled, 1 = enabled, 2 = loose)
    sensitivity  = 0                                      # Mouse sensitivity (-1.0 to 1.0, 0 = no change)

# Touchpad settings
    touchpad {
        disable_while_typing = false                      # Allow touchpad while typing
        natural_scroll       = false                      # Reverse scroll direction (macOS-style)
    }
}

gesture = 3, horizontal, workspace                        # 3-finger swipe to switch workspaces

# Find device names with: hyprctl devices
device {
    name       = epic-mouse-v1                            # Device name from hyprctl devices
    sensitivity = -0.5                                    # Per-device sensitivity override
}

