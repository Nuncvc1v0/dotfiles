# Author: Nuncvc1v0

# ALACRITTY CONFIGURATION                                #
# GPU-accelerated terminal emulator (Rust)

[env]
TERM = "xterm-256color"

[window]
# Window dimensions (in number of columns/lines)

# Window padding
padding = { x = 6, y = 6 }

# Spread additional padding evenly around the terminal content
dynamic_padding = true

# Window decorations (Full, None, Transparent, Buttonless)
decorations = "Full"

# Startup mode (Windowed, Maximized, Fullscreen)
startup_mode = "Windowed"

# Window title
title = "Alacritty"

# Allow terminal applications to change Alacritty's window title
dynamic_title = true

# Window opacity (0.0 - 1.0)
opacity = 0.95

# Blur background (Wayland/Hyprland support)
blur = true

[scrolling]
# Maximum number of lines in scrollback buffer
history = 10000

# Number of lines scrolled per scroll wheel/trackpad tick
multiplier = 3

[font]
# Font configuration
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }

# Font size
size = 11.0

# Offset is the extra space around each character
offset = { x = 0, y = 1 }

# Glyph offset determines the locations of the glyphs within their cells
glyph_offset = { x = 0, y = 0 }

[colors]
# Tokyo Night color scheme
# Primary colors
[colors.primary]
background = '#1a1b26'
foreground = '#c0caf5'

# Normal colors
[colors.normal]
black = '#15161e'
red = '#f7768e'
green = '#9ece6a'
yellow = '#e0af68'
blue = '#7aa2f7'
magenta = '#bb9af7'
cyan = '#7dcfff'
white = '#a9b1d6'

# Bright colors
[colors.bright]
black = '#414868'
red = '#ff899d'
green = '#9fe044'
yellow = '#faba4a'
blue = '#8db0ff'
magenta = '#c7a9ff'
cyan = '#a4daff'
white = '#c0caf5'

# Cursor colors
[colors.cursor]
text = "#1a1b26"
cursor = "#c0caf5"

# Selection colors
[colors.selection]
text = "CellForeground"
background = "#33467c"

[cursor]
# Cursor style (Block, Underline, Beam)
style = { shape = "Block", blinking = "On" }

# Cursor blinking interval in milliseconds
blink_interval = 750

# Vi mode cursor style
vi_mode_style = { shape = "Block", blinking = "Off" }

[mouse]
# Hide mouse cursor when typing
hide_when_typing = true

[hints]
# Terminal hints (URLs, paths, etc.)
enabled = [
    { regex = '''(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001f\u007f-\u009f<>"\\s{-}\\^⟨⟩`]+''',
      command = "xdg-open",
      post_processing = true,
      mouse = { enabled = true, mods = "Control" }
    }
]

[keyboard]
# Keyboard bindings
bindings = [
# Copy/Paste
    { key = "C", mods = "Control|Shift", action = "Copy" },
    { key = "V", mods = "Control|Shift", action = "Paste" },

# Search
    { key = "F", mods = "Control|Shift", action = "SearchForward" },

# Font size
    { key = "Plus", mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0", mods = "Control", action = "ResetFontSize" },

# Scrolling
    { key = "PageUp", mods = "Shift", action = "ScrollPageUp" },
    { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
    { key = "Home", mods = "Shift", action = "ScrollToTop" },
    { key = "End", mods = "Shift", action = "ScrollToBottom" },

# Yazi integration - open yazi file manager
    { key = "E", mods = "Control|Shift", command = { program = "yazi" } },

# New window
    { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
]

[bell]
# Visual bell configuration
animation = "EaseOutExpo"
duration = 0
color = "#ffffff"
