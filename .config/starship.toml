# оӮ  оӮў оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ’ оғ”

format = """
[оӮІ](fg:#0969da bg:#0969da)\
$username\
[оӮ°](fg:#0969da bg:#eac54f)\
$directory\
[оӮ°](fg:#eac54f bg:#e44729)\
$git_branch\
$git_status\
[оӮ° ](fg:#e44729)\
"""

right_format = """
[оӮІ](fg:#8250df)\
$time\
$all
$character
"""

[username]
show_always = true
style_user = "fg:#ffffff bg:#0969da"
style_root = "fg:#ffffff bg:#0969da"
format = '[$user ]($style)'
disabled = false

[directory]
style = "fg:#000000 bg:#eac54f"
format = "[ $path ]($style)"
disabled = false

[directory.substitutions]
"Documents" = "пңҳ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "fg:#ffffff bg:#e44729"
format = '[ $symbol $branch ]($style)'
disabled = false

[git_status]
style = "fg:#ffffff bg:#e44729"
format = '[$all_status$ahead_behind ]($style)'
disabled = false

# Start languages and tools #

